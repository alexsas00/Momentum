name: Build Momentum IPA
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions on this runner
        run: ls /Applications | grep -i xcode

      - name: Show default Xcode/SDK before selection
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Select Xcode 26 if available (else keep default)
        run: |
          if [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
            echo "Switched to Xcode 26"
          elif [ -d "/Applications/Xcode-26.app" ]; then
            sudo xcode-select -s /Applications/Xcode-26.app/Contents/Developer
            echo "Switched to Xcode-26"
          else
            echo "Xcode 26 not found on this runner — building with default Xcode (no Liquid Glass, code falls back to ultraThinMaterial)"
          fi

      - name: Show active Xcode/SDK after selection
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, device SDK)
        run: |
          set -o pipefail
          xcodebuild \
            -project Momentum.xcodeproj \
            -scheme Momentum \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build > xcodebuild.log 2>&1 || {
              echo "❌ Build failed — errors:"
              grep -E "error:|warning: .*deprecated" xcodebuild.log | head -60
              exit 1
            }
          echo "✅ Build OK"
          grep -c "warning:" xcodebuild.log || true

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R "build/Build/Products/Release-iphoneos/Momentum.app" Payload/
          zip -qry "Momentum-unsigned.ipa" Payload
          ls -la

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Momentum-unsigned-ipa
          path: Momentum-unsigned.ipa
          retention-days: 14

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
